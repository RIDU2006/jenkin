<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My First Web Page</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f4f4;
      }

      header {
        background-color: #761313;
        color: white;
        padding: 15px;
        text-align: center;
      }

      nav {
        background-color: #555;
        padding: 10px;
        text-align: center;
      }

      nav a {
        color: white;
        margin: 10px;
        text-decoration: none;
      }

      nav a:hover {
        color: yellow;
      }

      section {
        padding: 20px;
      }

      footer {
        background-color: #333;
        color: white;
        text-align: center;
        padding: 10px;
        position: fixed;
        bottom: 0;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Welcome to My Website</h1>
      <p>This is a sample HTML page</p>
    </header>

    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>

    <section>
      <h2>About This Page</h2>
      <p>This is a simple HTML template for beginners.</p>

      <h3>Features:</h3>
      <ul>
        <li>Header and Footer</li>
        <li>Navigation Menu</li>
        <li>Styled Content</li>
      </ul>

      <button onclick="showMessage()">Click Me</button>
    </section>

    <footer>
      <p>© 2026 My Website</p>
    </footer>

    <script>
      function showMessage() {
        alert("Hello! You clicked the button.");
      }
    </script>
  </body>
</html>
